name: Customer
description: A converted customer in the foreign trade system
table_name: customers

fields:
  id:
    type: integer
    primary_key: true
    auto_increment: true
    description: Unique identifier for the customer
  company_name:
    type: string
    required: true
    max_length: 255
    description: Customer's company name
  contact_name:
    type: string
    required: true
    max_length: 100
    description: Primary contact person's name
  contact_email:
    type: string
    required: true
    max_length: 255
    description: Primary contact email address
  contact_phone:
    type: string
    max_length: 50
    description: Contact phone number
  country:
    type: string
    required: true
    max_length: 100
    description: Country of customer's business
  industry:
    type: string
    max_length: 100
    description: Industry sector
  customer_type:
    type: string
    max_length: 20
    default: "importer"
    description: Type of customer (importer, exporter, both)
  credit_limit:
    type: float
    default: 0.0
    description: Assigned credit limit
  payment_terms:
    type: string
    max_length: 50
    description: Agreed payment terms
  tax_id:
    type: string
    max_length: 50
    description: Tax identification number
  notes:
    type: text
    description: Additional notes about the customer
  is_active:
    type: boolean
    default: true
    description: Whether the customer is currently active
  created_at:
    type: datetime
    default: "now"
    description: Timestamp when customer was created
  updated_at:
    type: datetime
    description: Timestamp when customer was last updated
  lead_id:
    type: integer
    description: Reference to original lead if converted
